  #     - ./frontend:/app
  #     - /app/node_modules
  #   environment:
  #     VITE_API_URL: http://localhost:8000/api
  #   networks:
  #     - legacyloop_network

volumes:
  mysql_data:
  redis_data:

networks:
  legacyloop_network:
    driver: bridge
