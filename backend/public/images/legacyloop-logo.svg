<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes wave1 {
        0%, 100% { stroke-dashoffset: 0; }
        50% { stroke-dashoffset: 50; }
      }
      @keyframes wave2 {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .logo-circle {
        transform-origin: 200px 200px;
        animation: rotate 20s linear infinite;
      }
      .logo-wave1 {
        animation: wave2 3s ease-in-out infinite;
      }
      .logo-wave2 {
        animation: wave2 3s ease-in-out infinite 0.3s;
      }
    </style>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00dd99;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff99;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle (for context) -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="rgba(0,102,255,0.08)" stroke-width="1" opacity="0.3"/>

  <!-- Main Logo - Infinity Loop -->
  <g class="logo-circle">
    <!-- Blue gradient arc (left loop) -->
    <path d="M 100 200 Q 100 120 160 120 Q 180 120 180 140 Q 180 100 160 100 Q 80 100 80 200 Q 80 280 140 300"
          fill="none" stroke="url(#blueGradient)" stroke-width="35" stroke-linecap="round" class="logo-wave1" filter="url(#glow)"/>

    <!-- Green gradient arc (right loop) -->
    <path d="M 300 200 Q 300 120 240 120 Q 220 120 220 140 Q 220 100 240 100 Q 320 100 320 200 Q 320 280 260 300"
          fill="none" stroke="url(#greenGradient)" stroke-width="35" stroke-linecap="round" class="logo-wave2" filter="url(#glow)"/>

    <!-- Center connecting path -->
    <path d="M 180 180 Q 200 160 220 180"
          fill="none" stroke="url(#blueGradient)" stroke-width="20" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Animated particles -->
  <g opacity="0.4">
    <circle cx="120" cy="140" r="3" fill="#0066ff" style="animation: floating 4s ease-in-out infinite;"/>
    <circle cx="280" cy="160" r="3" fill="#00dd99" style="animation: floating 4s ease-in-out infinite 0.5s;"/>
    <circle cx="200" cy="240" r="3" fill="#0099ff" style="animation: floating 5s ease-in-out infinite 1s;"/>
  </g>

  <style>
    @keyframes floating {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(10px, -5px); }
      50% { transform: translate(0, -10px); }
      75% { transform: translate(-10px, -5px); }
    }
  </style>
</svg>